name: Deploy VitePress site to Pages

on:
  push:
    branches: [ main ]   # change if your default branch is different
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel older queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed only if you use lastUpdated

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # set this if your lockfile is NOT at repo root
          cache-dependency-path: |
            package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Reproducible install from lockfile
      - name: Install dependencies
        run: npm ci

      # Fallback for npm optional-deps glitch (rollup native pkg)
      - name: Clean & reinstall (fallback)
        if: failure()
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm i

      - name: Build VitePress
        run: npm run docs:build   # should emit docs/.vitepress/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4